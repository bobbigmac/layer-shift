<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layer Shift Platformer</title>
  </head>
  <body>
    <main class="shell">
      <section class="game-shell">
        <div id="game"></div>
      </section>
      <section class="controls" aria-label="Controls">
        <p><strong>Move:</strong> A/D or left/right. <strong>Jump:</strong> Space/Z or gamepad A. <strong>Dash:</strong> Shift/X or gamepad X/RB.</p>
        <p><strong>Layer shift:</strong> Up moves backward, Down moves forward. Gamepad D-pad up/down works too.</p>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
